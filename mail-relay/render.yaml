services:
  - type: web
    name: glowbal-mail-relay
    runtime: python
    rootDir: mail-relay
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SMTP_HOST
        value: smtp.purelymail.com
      - key: SMTP_PORT
        value: "587"
      - key: APP_LINK
        value: https://auerlian.github.io/GlowBal/?app=1
      - key: ADMIN_TOKEN
        generateValue: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        value: Glowbal Team
